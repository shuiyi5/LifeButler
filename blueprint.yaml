# ─── 开发架构（固定） ───
development:
  methodology: "tdd"
  architecture: "external-memory-dual-phase"

  external_memory:
    - file: "TODO.md"
      purpose: "任务状态跟踪"
    - file: "DEV_LOG.md"
      purpose: "开发日志记录"
    - file: "FAILURES.md"
      purpose: "失败记录"
    - file: ".git"
      purpose: "版本控制与回滚"

  phase_1_initialization:
    description: "项目初始化 — 仅运行一次"
    run_once: true
    steps:
      - id: "init-001"
        action: "创建项目目录结构"
        command: |
          mkdir -p backend/app/{agent,tools,api,models,schemas,services,config,utils}
          mkdir -p backend/tests/{unit,integration,e2e}
          mkdir -p backend/alembic/versions
          touch backend/app/__init__.py
          touch backend/app/agent/__init__.py
          touch backend/app/tools/__init__.py
          touch backend/app/api/__init__.py
          touch backend/app/models/__init__.py
          touch backend/app/schemas/__init__.py
          touch backend/app/services/__init__.py
          touch backend/app/config/__init__.py
          touch backend/app/utils/__init__.py
        validation: "目录结构存在且 __init__.py 文件已创建"

      - id: "init-002"
        action: "初始化 Python 虚拟环境"
        command: |
          cd backend
          python -m venv venv
        validation: "backend/venv 目录存在"

      - id: "init-003"
        action: "创建并安装后端依赖"
        files:
          - path: "backend/requirements.txt"
            content: |
              fastapi>=0.104.0
              uvicorn[standard]>=0.24.0
              sqlalchemy[asyncio]>=2.0
              asyncpg>=0.29.0
              alembic>=1.13.0
              redis>=5.0.0
              python-jose[cryptography]>=3.3.0
              passlib[bcrypt]>=1.7.4
              pydantic>=2.5.0
              pydantic-settings>=2.1.0
              langchain>=0.1.0
              langgraph>=0.0.40
              anthropic>=0.40.0
              httpx>=0.25.0
              websockets>=12.0
              cryptography>=41.0.0
              feedparser>=6.0.0
              notion-client>=2.2.0
              python-multipart>=0.0.6
              pytest>=7.4.0
              pytest-asyncio>=0.23.0
              pytest-cov>=4.1.0
        command: |
          cd backend
          source venv/bin/activate
          pip install -r requirements.txt
        validation: "依赖安装成功，无报错"

      - id: "init-004"
        action: "初始化 React 前端项目"
        command: |
          npm create vite@latest frontend -- --template react-ts
          cd frontend
          npm install
          npm install -D tailwindcss postcss autoprefixer
          npx tailwindcss init -p
          npm install react-router-dom zustand axios recharts lucide-react
          npm install -D @types/react-router-dom jest @testing-library/react @testing-library/jest-dom
        validation: "frontend/node_modules 存在，package.json 包含所有依赖"

      - id: "init-005"
        action: "创建环境配置文件"
        files:
          - path: ".env.example"
            content: |
              # ─── AI 模型 ───
              CUSTOM_API_KEY=your-api-key
              AI_MODEL=claude-sonnet-4-6
              AI_BASE_URL=https://cursor.scihub.edu.kg/api
              AI_TEMPERATURE=0.7
              AI_MAX_TOKENS=4096

              # ─── 数据库 ───
              DATABASE_URL=postgresql://lifebutler:password@localhost:5432/lifebutler
              REDIS_URL=redis://localhost:6379/0

              # ─── 安全 ───
              SECRET_KEY=your-jwt-secret-key-change-this
              ENCRYPTION_KEY=your-aes-256-key-change-this

              # ─── 外部 API ───
              QWEATHER_API_KEY=your-qweather-key
              AMAP_API_KEY=your-amap-key
              QQ_EMAIL_ADDRESS=your-qq-email@qq.com
              QQ_EMAIL_AUTH_CODE=your-auth-code
              NOTION_API_KEY=your-notion-key
              NOTION_DATABASE_ID=your-notion-db-id
          - path: ".gitignore"
            content: |
              # Python
              __pycache__/
              *.py[cod]
              *$py.class
              venv/
              .env
              *.egg-info/

              # Node
              node_modules/
              dist/
              .vite/

              # IDE
              .vscode/
              .idea/

              # OS
              .DS_Store
              Thumbs.db

              # Testing
              .coverage
              htmlcov/
              .pytest_cache/

              # Database
              *.db
              *.sqlite3
        validation: "文件存在且内容正确"

      - id: "init-006"
        action: "初始化 Git 仓库"
        commands:
          - "git init"
          - "git add ."
          - "git commit -m 'chore: project initialization'"
        validation: "git log 显示首次提交"

      - id: "init-007"
        action: "创建 TODO.md"
        file: "TODO.md"
        content: "参见 blueprint 中生成的 TODO.md 内容"
        validation: "文件存在，包含所有任务"

      - id: "init-008"
        action: "创建 UI_DESIGN_GUIDE.md"
        condition: "project.type == 'gui'"
        file: "UI_DESIGN_GUIDE.md"
        content: "参见 blueprint 中生成的 UI_DESIGN_GUIDE.md 内容"
        validation: "文件存在"

      - id: "init-009"
        action: "创建开发日志和失败记录"
        files:
          - path: "DEV_LOG.md"
            content: |
              # 开发日志
              ## 项目初始化
              - 项目脚手架搭建完成
              - 后端依赖安装成功（FastAPI + LangChain + SQLAlchemy）
              - 前端依赖安装成功（React + TailwindCSS + Zustand）
              - Git 仓库初始化完成
              - 任务清单创建完成（共 46 个任务）
          - path: "FAILURES.md"
            content: |
              # 失败记录
              暂无失败记录。
        validation: "文件存在"

      - id: "init-010"
        action: "创建测试配置"
        files:
          - path: "backend/pytest.ini"
            content: |
              [pytest]
              asyncio_mode = auto
              testpaths = tests
              python_files = test_*.py
              python_functions = test_*
              addopts = -v --tb=short
          - path: "frontend/jest.config.ts"
            content: |
              export default {
                testEnvironment: 'jsdom',
                transform: {
                  '^.+\\.tsx?$': 'ts-jest',
                },
                moduleNameMapper: {
                  '\\.(css|less|scss)$': 'identity-obj-proxy',
                },
                setupFilesAfterSetup: ['@testing-library/jest-dom'],
              };
        validation: "测试命令可运行（即使 0 个测试用例）"

      - id: "init-011"
        action: "提交初始化完成状态"
        commands:
          - "git add ."
          - "git commit -m 'chore: initialization complete, ready for development'"
        validation: "git status 显示 clean"

  phase_2_development:
    description: "增量循环开发"
    loop: true
    max_retries_per_feature: 3

    on_failure:
      strategy: "skip_and_log"
      actions:
        - "将错误信息追加到 FAILURES.md"
        - "git checkout . （回滚未提交的更改）"
        - "在 TODO.md 中将该任务标记为 [Failed]"
        - "继续下一个任务"

    on_complete:
      actions:
        - "展示 TODO.md 最终状态"
        - "如果有 [Failed] 任务，展示 FAILURES.md 汇总"
        - "运行全量测试，展示结果"

    cycle:
      - step: "read_state"
        description: "读取当前状态"
        actions:
          - "读取 TODO.md，找到第一个 [Todo] 状态的任务"
          - "读取 DEV_LOG.md 末尾 20 行，了解上轮情况"
          - "如果是 GUI 任务，读取 UI_DESIGN_GUIDE.md"
          - "将当前任务在 TODO.md 中标记为 [In Progress]"
        output: "当前要开发的任务详情"

      - step: "write_test"
        description: "编写测试用例（TDD - Red）"
        actions:
          - "根据任务描述和 blueprint.yaml 中的测试定义，编写测试"
          - "运行测试，确认当前状态下测试失败（红灯）"
        output: "测试文件路径"

      - step: "write_code"
        description: "实现功能代码"
        rules:
          - "一次只实现当前任务，不要越界"
          - "如果是 GUI 项目，严格遵循 UI_DESIGN_GUIDE.md 的设计规范"
          - "代码要有适当注释"
          - "遵循项目已有的代码风格"
        output: "修改/新增的文件列表"

      - step: "run_test"
        description: "运行测试验证"
        actions:
          - "运行当前任务相关的测试"
          - "如果通过（绿灯）→ 进入 git_commit"
          - "如果失败（红灯）→ 分析错误 → 修改代码 → 重新运行"
          - "最多重试 3 次"
        output: "测试结果 (pass/fail)"

      - step: "git_commit"
        description: "提交代码"
        actions:
          - "git add ."
          - "git commit -m 'feat(T-{TASK_ID}): {TASK_SUMMARY}'"
        output: "commit hash"

      - step: "update_state"
        description: "更新项目状态"
        actions:
          - "TODO.md: 将任务标记为 [Done] 或 [Failed]"
          - "DEV_LOG.md: 追加本轮开发记录"
          - "git add . && git commit -m 'docs: update progress for T-{TASK_ID}'"
        output: "更新后的 TODO.md"

      - step: "clear_context"
        description: "清空上下文，准备下一轮"
        note: "本轮对话结束。下一轮将从 read_state 重新开始，通过读取文件恢复上下文。"

    # ─── 功能任务列表 ───
    features:
      # ── 基础架构 P0 ──
      - id: "T-100"
        name: "用户注册 API"
        description: "实现邮箱+密码注册接口，密码 bcrypt 哈希存储，数据库持久化"
        priority: "P0"
        dependencies: []
        estimated_complexity: "medium"
        implementation_notes: |
          - 使用 FastAPI 路由 POST /api/auth/register
          - Pydantic 模型校验邮箱格式和密码强度
          - 密码使用 passlib bcrypt 哈希
          - 检查邮箱唯一性，重复返回 409
          - 成功返回 user_id + 201
        tests:
          - id: "TC-100-1"
