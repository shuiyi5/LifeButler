version: "1.0"
generated_at: "2025-01-01T00:00:00Z"

# ─── 项目基本信息 ───
project:
  name: "LifeButler"
  description: "主动关怀型 AI 个人生活管家，通过自然语言对话管理日程、财务、健康、出行等 15 大生活场景"
  type: "gui"
  platform: "web"
  future_platforms: ["mobile", "desktop"]

# ─── 技术栈 ───
tech_stack:
  language: "Python 3.11+ / TypeScript 5+"
  runtime: "Python 3.11 + Node.js 18"
  package_manager: "pip + npm"
  backend:
    framework: "FastAPI"
    port: 8000
    orm: "SQLAlchemy 2.0"
    migration: "Alembic"
    auth: "python-jose (JWT) + bcrypt"
  frontend:
    framework: "React 18"
    ui_library: "自定义组件"
    css_framework: "TailwindCSS 3"
    build_tool: "Vite"
    state_management: "Zustand"
    chart_library: "Recharts"
    icon_library: "Lucide React"
  testing:
    unit: "pytest + pytest-asyncio (后端) / Jest + React Testing Library (前端)"
    integration: "pytest + httpx AsyncClient"
    e2e: "Playwright"
  additional_dependencies:
    - name: "langchain"
      version: "latest"
      purpose: "AI Agent 框架"
    - name: "langgraph"
      version: "latest"
      purpose: "Agent 编排图"
    - name: "anthropic"
      version: "latest"
      purpose: "Claude API 客户端"
    - name: "sqlalchemy[asyncio]"
      version: ">=2.0"
      purpose: "异步 ORM"
    - name: "asyncpg"
      version: "latest"
      purpose: "PostgreSQL 异步驱动"
    - name: "redis"
      version: "latest"
      purpose: "Redis 客户端"
    - name: "cryptography"
      version: "latest"
      purpose: "AES-256 数据加密"
    - name: "websockets"
      version: "latest"
      purpose: "WebSocket 支持"
    - name: "httpx"
      version: "latest"
      purpose: "异步 HTTP 客户端（外部 API 调用）"
    - name: "feedparser"
      version: "latest"
      purpose: "RSS 新闻源解析"
    - name: "notion-client"
      version: "latest"
      purpose: "Notion API 客户端"
    - name: "react-router-dom"
      version: "latest"
      purpose: "前端路由"
    - name: "zustand"
      version: "latest"
      purpose: "前端状态管理"
    - name: "recharts"
      version: "latest"
      purpose: "数据图表"
    - name: "lucide-react"
      version: "latest"
      purpose: "图标库"
    - name: "axios"
      version: "latest"
      purpose: "HTTP 请求"

# ─── AI 模型配置 ───
ai_config:
  provider: "custom-anthropic"
  model: "claude-sonnet-4-6"
  api_key_env: "CUSTOM_API_KEY"
  base_url: "https://cursor.scihub.edu.kg/api"
  parameters:
    temperature: 0.7
    max_tokens: 4096
    top_p: 0.9
    stream: true

# ─── Agent 定义 ───
agent:
  role: "LifeButler 是一位温暖贴心的 AI 生活管家，擅长通过自然语言理解用户需求并调用合适的工具来管理用户的日常生活。"
  goal: "让用户通过一个统一的对话入口高效管理所有生活事务，并在用户登录时主动提供关怀性的汇总和建议。"
  pattern: "react"
  system_prompt: |
    你是 LifeButler，一位温暖贴心的 AI 生活管家。

    你的性格：
    - 温暖亲和，像一个关心你的朋友
    - 主动关怀，会提醒用户注意天气、喝水、休息
    - 高效专业，快速理解用户意图并完成任务
    - 说话自然，适当使用"~"、"呀"、"哦"等语气词和 Emoji

    问候语规则（根据时间段）：
    - 早晨(6-11)："早上好~今天也要元气满满哦！"
    - 中午(11-14)："午安~记得好好吃午饭呀"
    - 下午(14-18)："下午好~今天辛苦了"
    - 晚上(18-22)："晚上好~今天过得怎么样？"
    - 深夜(22-6)："夜深了，早点休息哦~"

    你可以使用以下工具来帮助用户：
    1. 日程管理 - 创建/查询/修改/删除日程
    2. 待办管理 - 管理待办事项
    3. 天气查询 - 查天气和穿衣建议
    4. 新闻摘要 - 获取热点新闻
    5. 记账理财 - 记录收支和统计
    6. 饮食健康 - 记录饮食和营养分析
    7. 习惯打卡 - 管理和打卡习惯
    8. 购物清单 - 管理购物清单
    9. 读书学习 - 管理读书计划和进度
    10. 智能家居 - 控制智能设备
    11. 邮件管理 - 查看和回复邮件
    12. 出行规划 - 路线和交通查询
    13. 备忘笔记 - 记录笔记并同步 Notion

    规则：
    - 理解用户的自然语言并调用正确的工具
    - 如果用户的请求模糊，友好地追问确认
    - 执行操作后给出简洁友好的确认
    - 适当主动关怀（提醒喝水、注意天气等）
  constraints:
    - "每次只调用必要的工具，避免过度调用"
    - "敏感数据（财务、邮件）必须通过加密服务存取"
    - "外部 API 调用失败时必须有降级策略和友好提示"
    - "所有操作必须在用户认证后才可执行"
  capabilities:
    - "自然语言意图识别与多工具路由"
    - "流式对话输出"
    - "主动关怀汇总推送"
    - "多功能模块协同（如出行+天气联合建议）"
  memory:
    type: "hybrid"
    max_history: 20
    storage: "Redis（短期会话缓存）+ PostgreSQL（长期历史存储）"

# ─── 工具定义 ───
tools:
  - name: "calendar_tool"
    type: "database"
    description: "日程管理 — 创建/查询/修改/删除日程事件"
    config:
      table: "calendar_events"
      operations: ["create", "read", "update", "delete"]
      features: ["repeat_events", "conflict_detection"]

  - name: "todo_tool"
    type: "database"
    description: "待办管理 — 任务 CRUD + 优先级 + 截止日期"
    config:
      table: "todos"
      operations: ["create", "read", "update", "delete"]
      features: ["priority", "due_date", "category", "status_filter"]

  - name: "weather_tool"
    type: "api"
    description: "天气查询 — 和风天气实时天气 + 7日预报 + 穿衣建议"
    config:
      provider: "QWeather"
      api_key_env: "QWEATHER_API_KEY"
      base_url: "https://devapi.qweather.com/v7"
      endpoints:
        realtime: "/weather/now"
        forecast: "/weather/7d"
        indices: "/indices/1d"

  - name: "news_tool"
    type: "api"
    description: "新闻摘要 — RSS 多源聚合 + AI 摘要生成"
    config:
      sources: ["RSS feeds"]
      ai_summary: true

  - name: "finance_tool"
    type: "database"
    description: "记账理财 — 收支记录 + 分类统计 + 预算预警"
    config:
      table: "transactions"
      operations: ["create", "read", "statistics"]
      features: ["auto_categorize", "budget_alert", "monthly_report"]
      encryption: true

  - name: "health_tool"
    type: "database"
    description: "饮食健康 — 饮食记录 + 营养估算 + 饮水提醒"
    config:
      table: "meal_records"
      operations: ["create", "read", "statistics"]
      features: ["nutrition_estimate", "water_reminder"]

  - name: "habit_tool"
    type: "database"
    description: "习惯打卡 — 创建习惯 + 打卡 + 连续天数统计"
    config:
      tables: ["habits", "habit_check_ins"]
      operations: ["create", "check_in", "statistics"]
      features: ["streak_count", "completion_rate", "break_reminder"]

  - name: "shopping_tool"
    type: "database"
    description: "购物清单 — 商品添加 + 分类 + 勾选已购"
    config:
      table: "shopping_items"
      operations: ["create", "read", "update", "delete"]
      features: ["auto_categorize", "batch_add", "clear_purchased"]

  - name: "reading_tool"
    type: "database"
    description: "读书学习 — 读书计划 + 进度追踪 + 落后提醒"
    config:
      table: "reading_plans"
      operations: ["create", "update_progress", "statistics"]
      features: ["progress_tracking", "behind_schedule_alert"]

  - name: "smarthome_tool"
    type: "custom"
    description: "智能家居 — 通用设备控制接口（Mock 模式）"
    config:
      adapter_pattern: true
      mock_mode: true
      supported_actions: ["turn_on", "turn_off", "set_temperature", "set_brightness"]

  - name: "email_tool"
    type: "api"
    description: "邮件管理 — QQ 邮箱 IMAP 收件 + SMTP 发件 + AI 摘要"
    config:
      provider: "QQ Mail"
      imap_host: "imap.qq.com"
      imap_port: 993
      smtp_host: "smtp.qq.com"
      smtp_port: 465
      email_env: "QQ_EMAIL_ADDRESS"
      auth_code_env: "QQ_EMAIL_AUTH_CODE"
      encryption: true

  - name: "travel_tool"
    type: "api"
    description: "出行规划 — 高德地图路线规划 + POI 搜索"
    config:
      provider: "AMap"
      api_key_env: "AMAP_API_KEY"
      base_url: "https://restapi.amap.com/v3"
      endpoints:
        direction_driving: "/direction/driving"
        direction_transit: "/direction/transit/integrated"
        direction_walking: "/direction/walking"
        poi_search: "/place/around"
        geocode: "/geocode/geo"

  - name: "notion_tool"
    type: "api"
    description: "备忘笔记 — 本地存储 + Notion 同步"
    config:
      provider: "Notion"
      api_key_env: "NOTION_API_KEY"
      database_id_env: "NOTION_DATABASE_ID"
      base_url: "https://api.notion.com/v1"
      fallback: "local_storage"

